name: UCI Kino Scraper

on:
  schedule:
    - cron: '0 */2 * * *'   # alle 2 Stunden
  workflow_dispatch:          # auch manuell startbar

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Abhängigkeiten installieren
        run: npm install

      - name: UCI Kino scrapen
        run: node scraper.js

      - name: Ergebnis committen
        run: |
          git config user.name  "UCI Scraper Bot"
          git config user.email "bot@uci-kino"
          git add data/movies.json
          git diff --staged --quiet || git commit -m "Kinoprogramm aktualisiert $(date '+%d.%m.%Y %H:%M')"
          git push
