<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UCI Kino Bad Oeynhausen – Kinoprogramm</title>
  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #18181c;
      --card: #1e1e24;
      --border: #2a2a35;
      --gold: #e2a53a;
      --gold-dim: #a8762a;
      --text: #f0f0f0;
      --text-dim: #8a8a9a;
      --green: #4ade80;
      --blue: #60a5fa;
      --red: #f87171;
      --orange: #fb923c;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: linear-gradient(135deg, #0d0d0f 0%, #1a1205 50%, #0d0d0f 100%);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--gold);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .logo h1 {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }

    .logo span {
      font-size: 0.75rem;
      color: var(--gold);
      display: block;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .fetch-time {
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    .btn-refresh {
      background: var(--gold);
      color: #000;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-refresh:hover { background: #f0b84a; }
    .btn-refresh:active { transform: scale(0.97); }
    .btn-refresh.loading { opacity: 0.6; pointer-events: none; }

    .spin { display: inline-block; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* FILTERS */
    .filters-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      position: sticky;
      top: 64px;
      z-index: 99;
    }

    .filters-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .search-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      color: var(--text);
      font-size: 0.9rem;
      width: 240px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box:focus { border-color: var(--gold); }
    .search-box::placeholder { color: var(--text-dim); }

    .filter-tabs {
      display: flex;
      gap: 6px;
    }

    .filter-tab {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 14px;
      color: var(--text-dim);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .filter-tab:hover { color: var(--text); border-color: var(--gold-dim); }
    .filter-tab.active { background: var(--gold); color: #000; border-color: var(--gold); font-weight: 600; }
    .filter-tab.fav-tab.active { background: #e8c84a; }

    /* FAVORITEN BUTTON */
    .fav-btn {
      position: absolute;
      top: 8px; right: 8px;
      width: 32px; height: 32px;
      border-radius: 50%;
      background: rgba(0,0,0,0.6);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      backdrop-filter: blur(4px);
      transition: transform 0.2s, background 0.2s;
      z-index: 5;
      line-height: 1;
    }
    .fav-btn:hover { transform: scale(1.15); }
    .fav-btn.active { background: rgba(226,165,58,0.85); }

    /* Favoriten-Karte: goldener linker Rand */
    .movie-card.is-fav { border-color: var(--gold-dim); }
    .movie-card.is-fav .card-title::before {
      content: '⭐ ';
      font-size: 0.8em;
    }

    /* MAIN */
    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .section-title {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }

    .section-title .dot.upcoming { background: var(--blue); animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(74,222,128,0.4); }
      50% { opacity: 0.8; box-shadow: 0 0 0 6px rgba(74,222,128,0); }
    }

    .section-count {
      font-size: 0.85rem;
      color: var(--text-dim);
      font-weight: 400;
    }

    .movie-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 48px;
    }

    /* MOVIE CARD */
    .movie-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }

    .movie-card:hover {
      transform: translateY(-4px);
      border-color: var(--gold-dim);
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    }

    .poster-wrapper {
      position: relative;
      aspect-ratio: 2/3;
      background: var(--surface);
      overflow: hidden;
    }

    .poster-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s;
    }

    .movie-card:hover .poster-wrapper img {
      transform: scale(1.04);
    }

    .poster-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--text-dim);
      font-size: 0.8rem;
      text-align: center;
      padding: 16px;
    }

    .poster-placeholder .film-icon { font-size: 48px; opacity: 0.3; }

    .fsk-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.75);
      border: 1.5px solid;
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 0.72rem;
      font-weight: 700;
      backdrop-filter: blur(4px);
    }

    .fsk-0 { border-color: var(--green); color: var(--green); }
    .fsk-6 { border-color: var(--green); color: var(--green); }
    .fsk-12 { border-color: var(--gold); color: var(--gold); }
    .fsk-16 { border-color: var(--orange); color: var(--orange); }
    .fsk-18 { border-color: var(--red); color: var(--red); }

    .version-badges {
      position: absolute;
      bottom: 10px;
      left: 10px;
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .version-badge {
      background: rgba(0,0,0,0.75);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--text-dim);
      backdrop-filter: blur(4px);
    }

    .version-badge.imax { border-color: var(--blue); color: var(--blue); }
    .version-badge.threeD { border-color: var(--gold); color: var(--gold); }

    .card-body {
      padding: 16px;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 4px;
      color: var(--text);
    }

    .card-original-title {
      font-size: 0.78rem;
      color: var(--text-dim);
      margin-bottom: 8px;
      font-style: italic;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .tag {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 7px;
      font-size: 0.72rem;
      color: var(--text-dim);
    }

    .runtime-tag { color: var(--text-dim); }

    .card-desc {
      font-size: 0.82rem;
      color: var(--text-dim);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 14px;
    }

    .showtimes {
      border-top: 1px solid var(--border);
      padding-top: 12px;
    }

    .showtimes-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    .showtime-day {
      margin-bottom: 8px;
    }

    .showtime-date {
      font-size: 0.75rem;
      color: var(--gold);
      font-weight: 600;
      margin-bottom: 4px;
    }

    .showtime-times {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .showtime-slot {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 3px 8px;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text);
      transition: background 0.15s, border-color 0.15s;
    }

    .showtime-slot:hover {
      background: var(--gold);
      border-color: var(--gold);
      color: #000;
    }

    .showtime-version {
      font-size: 0.65rem;
      color: var(--text-dim);
      margin-left: 2px;
    }

    .more-showtimes {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-top: 4px;
    }

    /* LOADING / ERROR */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      gap: 16px;
      color: var(--text-dim);
    }

    .loader {
      width: 48px;
      height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .error-state {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      border-radius: 12px;
      padding: 24px;
      text-align: center;
      color: var(--red);
      margin: 40px auto;
      max-width: 500px;
    }

    .empty-state {
      text-align: center;
      color: var(--text-dim);
      padding: 40px;
      font-size: 0.9rem;
    }

    /* MODAL */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      backdrop-filter: blur(6px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-backdrop.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      max-width: 740px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      transform: scale(0.95);
      transition: transform 0.2s;
    }

    .modal-backdrop.open .modal { transform: scale(1); }

    .modal-header {
      display: flex;
      gap: 20px;
      padding: 24px;
      border-bottom: 1px solid var(--border);
    }

    .modal-poster {
      width: 120px;
      height: 180px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--surface);
    }

    .modal-poster-placeholder {
      width: 120px;
      height: 180px;
      border-radius: 8px;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      flex-shrink: 0;
    }

    .modal-info { flex: 1; }

    .modal-title {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .modal-orig { font-size: 0.85rem; color: var(--text-dim); font-style: italic; margin-bottom: 12px; }

    .modal-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .modal-tag {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 0.8rem;
      color: var(--text-dim);
    }

    .modal-desc {
      font-size: 0.9rem;
      line-height: 1.7;
      color: var(--text-dim);
    }

    .modal-showtimes {
      padding: 24px;
    }

    .modal-showtimes-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .modal-day {
      margin-bottom: 14px;
    }

    .modal-day-name {
      font-size: 0.85rem;
      color: var(--gold);
      font-weight: 600;
      margin-bottom: 6px;
    }

    .modal-times {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .modal-time-slot {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 0.85rem;
      font-weight: 500;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      text-decoration: none;
      color: var(--text);
    }

    .modal-time-slot:hover {
      background: var(--gold);
      border-color: var(--gold);
      color: #000;
    }

    .modal-time-slot .ver {
      font-size: 0.65rem;
      opacity: 0.7;
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 36px;
      height: 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      font-size: 1.2rem;
      transition: background 0.15s;
    }

    .modal-close:hover { background: var(--border); }

    /* DIVIDER */
    .section-divider {
      margin: 12px 0 32px;
      border: none;
      border-top: 1px solid var(--border);
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 24px;
      color: var(--text-dim);
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
      margin-top: 40px;
    }

    footer a { color: var(--gold); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* =====================
       MOBILE (≤ 640px)
    ===================== */
    @media (max-width: 640px) {

      /* --- Header --- */
      header { padding: 0 16px; }
      .header-inner { height: 54px; }
      .logo h1 { font-size: 1rem; }
      .logo span { font-size: 0.68rem; }
      .logo-icon { width: 30px; height: 30px; font-size: 16px; border-radius: 6px; }
      .fetch-time { display: none; }
      .btn-refresh {
        padding: 7px 10px;
        font-size: 0;   /* Text ausblenden */
        gap: 0;
        border-radius: 50%;
        width: 34px; height: 34px;
        justify-content: center;
      }
      #refreshIcon { font-size: 18px; }

      /* --- Filterleiste --- */
      .filters-bar { padding: 10px 16px; top: 54px; }
      .filters-inner { flex-direction: column; gap: 8px; align-items: stretch; }
      .search-box { width: 100%; font-size: 1rem; padding: 10px 14px; }
      .filter-tabs { gap: 6px; overflow-x: auto; padding-bottom: 2px; }
      .filter-tabs::-webkit-scrollbar { display: none; }
      .filter-tab { padding: 7px 16px; font-size: 0.82rem; flex-shrink: 0; }

      /* --- Main --- */
      main { padding: 16px; }
      .section-title { font-size: 1.1rem; margin-bottom: 12px; }

      /* --- Film-Grid: eine Spalte, horizontale Karten --- */
      .movie-grid {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 32px;
      }

      .movie-card {
        display: flex;
        flex-direction: row;
        border-radius: 12px;
        min-height: 0;
      }
      .movie-card:hover { transform: none; } /* kein hover-lift auf touch */
      .movie-card:active { transform: scale(0.98); }

      /* Poster: kleines Thumbnail links, füllt immer die volle Kartenhöhe */
      .poster-wrapper {
        width: 90px;
        min-width: 90px;
        aspect-ratio: unset;
        height: auto;
        align-self: stretch;
        border-radius: 12px 0 0 12px;
        flex-shrink: 0;
      }
      .poster-wrapper img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center top;
      }
      .movie-card:hover .poster-wrapper img { transform: none; }

      .fsk-badge {
        top: 6px; left: 6px;
        font-size: 0.62rem;
        padding: 1px 5px;
      }
      .fav-btn {
        top: 6px; right: 6px;
        width: 28px; height: 28px;
        font-size: 14px;
      }
      .version-badges { bottom: 6px; left: 6px; gap: 2px; }
      .version-badge { font-size: 0.58rem; padding: 1px 4px; }

      /* Card Body: rechts vom Poster */
      .card-body {
        padding: 10px 12px;
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      .card-title {
        font-size: 0.92rem;
        margin-bottom: 3px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .card-original-title { font-size: 0.72rem; margin-bottom: 4px; }
      .card-meta { gap: 5px; margin-bottom: 0; }
      .tag { font-size: 0.68rem; padding: 1px 6px; }

      /* Beschreibung auf Mobil ausblenden — spart Platz */
      .card-desc { display: none; }

      /* Vorstellungen kompakter */
      .showtimes { padding-top: 8px; border-top: 1px solid var(--border); }
      .showtimes-label { display: none; }
      .showtime-day { margin-bottom: 5px; }
      .showtime-date { font-size: 0.7rem; margin-bottom: 3px; }
      .showtime-slot { padding: 2px 6px; font-size: 0.72rem; }
      .more-showtimes { font-size: 0.68rem; }

      /* --- Modal als Bottom-Sheet --- */
      .modal-backdrop {
        align-items: flex-end;
        padding: 0;
      }

      .modal {
        border-radius: 20px 20px 0 0;
        max-height: 92vh;
        width: 100%;
        max-width: 100%;
        transform: translateY(100%);
        transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
        border-bottom: none;
      }

      .modal-backdrop.open .modal {
        transform: translateY(0);
      }

      /* Drag-Indikator oben */
      .modal::before {
        content: '';
        display: block;
        width: 36px;
        height: 4px;
        background: var(--border);
        border-radius: 2px;
        margin: 12px auto 0;
      }

      .modal-close {
        top: 12px; right: 12px;
        width: 30px; height: 30px;
        font-size: 1rem;
      }

      .modal-header {
        flex-direction: row;
        gap: 14px;
        padding: 16px 16px 14px;
      }

      .modal-poster {
        width: 90px;
        height: 130px;
        border-radius: 8px;
      }
      .modal-poster-placeholder {
        width: 90px;
        height: 130px;
        font-size: 32px;
        border-radius: 8px;
      }

      .modal-title { font-size: 1.1rem; }
      .modal-orig { font-size: 0.78rem; }
      .modal-tag { font-size: 0.74rem; padding: 2px 8px; }
      .modal-desc { font-size: 0.82rem; line-height: 1.55; }

      .modal-showtimes { padding: 16px; }
      .modal-showtimes-title { font-size: 0.95rem; margin-bottom: 12px; }
      .modal-day { margin-bottom: 12px; }
      .modal-day-name { font-size: 0.8rem; }

      .modal-time-slot {
        padding: 8px 12px;
        font-size: 0.82rem;
        min-width: 58px;
        border-radius: 10px;
      }

      /* Footer kleiner */
      footer { padding: 16px; font-size: 0.72rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">🎬</div>
      <h1>UCI Kino <span>Bad Oeynhausen · Luxe</span></h1>
    </div>
    <div class="header-actions">
      <span class="fetch-time" id="fetchTime"></span>
      <button class="btn-refresh" id="refreshBtn" onclick="loadMovies(true)">
        <span id="refreshIcon">↻</span> Aktualisieren
      </button>
    </div>
  </div>
</header>

<div class="filters-bar">
  <div class="filters-inner">
    <input class="search-box" type="search" id="searchInput" placeholder="Film suchen…" oninput="renderMovies()" />
    <div class="filter-tabs">
      <button class="filter-tab active" data-filter="all" onclick="setFilter('all')">Alle</button>
      <button class="filter-tab" data-filter="current" onclick="setFilter('current')">Jetzt im Kino</button>
      <button class="filter-tab" data-filter="upcoming" onclick="setFilter('upcoming')">Demnächst</button>
      <button class="filter-tab fav-tab" data-filter="favs" onclick="setFilter('favs')">⭐ Favoriten</button>
    </div>
  </div>
</div>

<main id="main">
  <div class="loading-state" id="loadingState">
    <div class="loader"></div>
    <p>Lade Kinoprogramm…</p>
  </div>
</main>

<div id="modalBackdrop" class="modal-backdrop" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModalBtn()">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<footer>
  Daten von <a href="https://www.uci-kinowelt.de/kinoprogramm/bad-oeynhausen/73/poster" target="_blank">UCI Kinowelt Bad Oeynhausen</a>
  · Automatisch aktualisiert
</footer>

<script>
  let allMovies = [];
  let activeFilter = 'all';
  let isLoading = false;

  // ── Favoriten (localStorage) ──────────────────────────
  function getFavs() {
    try { return new Set(JSON.parse(localStorage.getItem('uci-favs') || '[]')); }
    catch { return new Set(); }
  }
  function saveFavs(set) {
    localStorage.setItem('uci-favs', JSON.stringify([...set]));
  }
  function toggleFav(filmId, btn) {
    const favs = getFavs();
    if (favs.has(filmId)) {
      favs.delete(filmId);
      btn.classList.remove('active');
      btn.textContent = '☆';
      btn.closest('.movie-card').classList.remove('is-fav');
    } else {
      favs.add(filmId);
      btn.classList.add('active');
      btn.textContent = '⭐';
      btn.closest('.movie-card').classList.add('is-fav');
    }
    saveFavs(favs);
    // Favoriten-Tab Badge aktualisieren
    updateFavTab(favs.size);
  }
  function updateFavTab(count) {
    const tab = document.querySelector('.fav-tab');
    if (tab) tab.textContent = count > 0 ? `⭐ Favoriten (${count})` : '⭐ Favoriten';
  }

  async function loadMovies(force = false) {
    if (isLoading) return; // bereits am laden → ignorieren
    isLoading = true;

    const btn = document.getElementById('refreshBtn');
    const icon = document.getElementById('refreshIcon');
    btn.classList.add('loading');
    icon.classList.add('spin');
    icon.textContent = '↻';

    // AbortController: bricht Anfrage nach 25 Sekunden ab
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 25000);

    try {
      const url = force ? '/api/refresh' : '/api/movies';
      const res = await fetch(url, { signal: controller.signal });
      clearTimeout(timeout);

      if (!res.ok) throw new Error(`Server-Fehler: ${res.status}`);
      const json = await res.json();

      if (!json.success) throw new Error(json.error || 'Unbekannter Fehler');

      allMovies = json.movies || [];

      const t = new Date(json.fetchedAt);
      document.getElementById('fetchTime').textContent =
        'Stand: ' + t.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' }) + ' Uhr';

      renderMovies();
    } catch (err) {
      clearTimeout(timeout);
      if (err.name === 'AbortError') {
        showError('Zeitüberschreitung — UCI antwortet zu langsam. Bitte erneut versuchen.');
      } else {
        showError(err.message);
      }
    } finally {
      isLoading = false;
      btn.classList.remove('loading');
      icon.classList.remove('spin');
    }
  }

  function setFilter(f) {
    activeFilter = f;
    document.querySelectorAll('.filter-tab').forEach(el => {
      el.classList.toggle('active', el.dataset.filter === f);
    });
    renderMovies();
  }

  function renderMovies() {
    const main = document.getElementById('main');
    const search = document.getElementById('searchInput').value.toLowerCase().trim();

    let movies = allMovies;

    if (search) {
      movies = movies.filter(m =>
        m.title.toLowerCase().includes(search) ||
        (m.genre || '').toLowerCase().includes(search) ||
        (m.originalTitle || '').toLowerCase().includes(search)
      );
    }

    const today = new Date();
    today.setHours(0, 0, 0, 0);

    const favs = getFavs();
    updateFavTab(favs.size);

    let current = movies.filter(m => !m.isUpcoming);
    let upcoming = movies.filter(m => m.isUpcoming);

    if (activeFilter === 'current')  upcoming = [];
    if (activeFilter === 'upcoming') current = [];
    if (activeFilter === 'favs') {
      current  = current.filter(m => favs.has(m.filmId));
      upcoming = upcoming.filter(m => favs.has(m.filmId));
    }

    if (current.length === 0 && upcoming.length === 0) {
      if (allMovies.length === 0) {
        main.innerHTML = `
          <div class="error-state">
            <p><strong>Keine Filmdaten gefunden.</strong></p>
            <p style="margin-top:8px;font-size:0.85rem;">Die UCI-Website hat möglicherweise ihre Struktur geändert. Bitte versuche es später erneut oder besuche <a href="https://www.uci-kinowelt.de/kinoprogramm/bad-oeynhausen/73/poster" target="_blank" style="color:var(--gold)">uci-kinowelt.de</a> direkt.</p>
          </div>`;
      } else if (activeFilter === 'favs') {
        main.innerHTML = `
          <div class="empty-state" style="padding:60px 24px;">
            <div style="font-size:48px;margin-bottom:16px;">⭐</div>
            <p style="font-size:1rem;font-weight:600;margin-bottom:8px;">Noch keine Favoriten</p>
            <p style="font-size:0.85rem;">Tippe auf ☆ auf einer Filmkarte um ihn hier zu speichern.</p>
          </div>`;
      } else {
        main.innerHTML = `<div class="empty-state">Keine Filme gefunden.</div>`;
      }
      return;
    }

    let html = '';

    if (current.length > 0) {
      html += `
        <h2 class="section-title">
          <span class="dot"></span>
          Jetzt im Kino
          <span class="section-count">${current.length} ${current.length === 1 ? 'Film' : 'Filme'}</span>
        </h2>
        <div class="movie-grid">
          ${current.map(m => movieCard(m)).join('')}
        </div>
        <hr class="section-divider">
      `;
    }

    if (upcoming.length > 0) {
      html += `
        <h2 class="section-title">
          <span class="dot upcoming"></span>
          Demnächst
          <span class="section-count">${upcoming.length} ${upcoming.length === 1 ? 'Film' : 'Filme'}</span>
        </h2>
        <div class="movie-grid">
          ${upcoming.map(m => movieCard(m)).join('')}
        </div>
      `;
    }

    main.innerHTML = html;
  }

  function movieCard(m) {
    const poster = m.poster
      ? `<img src="${escHtml(m.poster)}" alt="${escHtml(m.title)}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=poster-placeholder><span class=film-icon>🎬</span>${escHtml(m.title)}</div>'">`
      : `<div class="poster-placeholder"><span class="film-icon">🎬</span><span>${escHtml(m.title)}</span></div>`;

    const fskClass = ['0','6','12','16','18'].includes(String(m.fsk)) ? `fsk-${m.fsk}` : '';
    const fskBadge = m.fsk ? `<span class="fsk-badge ${fskClass}">FSK ${m.fsk}</span>` : '';

    const versions = new Set();
    (m.showtimes || []).forEach(day => day.times.forEach(t => {
      if (t.version) versions.add(t.version.toUpperCase());
    }));
    const versionBadges = [...versions].slice(0, 3).map(v => {
      const cls = v === 'IMAX' ? 'imax' : v.includes('3D') ? 'threeD' : '';
      return `<span class="version-badge ${cls}">${escHtml(v)}</span>`;
    }).join('');

    const genres = m.genre ? m.genre.split(',').slice(0, 2).map(g =>
      `<span class="tag">${escHtml(g.trim())}</span>`
    ).join('') : '';

    const runtime = m.runtime ? `<span class="tag runtime-tag">${m.runtime} Min.</span>` : '';

    const desc = m.description ? `<p class="card-desc">${escHtml(m.description)}</p>` : '';

    // Show only first 2 days of showtimes on card
    const shownDays = (m.showtimes || []).slice(0, 2);
    const moreDays = (m.showtimes || []).length - shownDays.length;

    const showtimesHtml = shownDays.length > 0 ? `
      <div class="showtimes">
        <div class="showtimes-label">Vorstellungen</div>
        ${shownDays.map(day => `
          <div class="showtime-day">
            <div class="showtime-date">${escHtml(day.date)}</div>
            <div class="showtime-times">
              ${day.times.slice(0, 5).map(t => `
                <span class="showtime-slot">
                  ${escHtml(t.time)}${t.version ? `<span class="showtime-version">${escHtml(t.version)}</span>` : ''}
                </span>
              `).join('')}
              ${day.times.length > 5 ? `<span class="showtime-slot" style="color:var(--text-dim)">+${day.times.length-5}</span>` : ''}
            </div>
          </div>
        `).join('')}
        ${moreDays > 0 ? `<div class="more-showtimes">+ ${moreDays} weitere Tag${moreDays === 1 ? '' : 'e'}</div>` : ''}
      </div>
    ` : '';

    const idx = allMovies.indexOf(m);
    const isFav = getFavs().has(m.filmId);

    return `
      <div class="movie-card${isFav ? ' is-fav' : ''}" onclick="openModal(${idx})">
        <div class="poster-wrapper">
          ${poster}
          ${fskBadge}
          <button class="fav-btn${isFav ? ' active' : ''}"
            onclick="event.stopPropagation(); toggleFav('${m.filmId}', this)"
            title="${isFav ? 'Aus Favoriten entfernen' : 'Zu Favoriten hinzufügen'}">
            ${isFav ? '⭐' : '☆'}
          </button>
          ${versionBadges ? `<div class="version-badges">${versionBadges}</div>` : ''}
        </div>
        <div class="card-body">
          <div class="card-title">${escHtml(m.title)}</div>
          ${m.originalTitle && m.originalTitle !== m.title ? `<div class="card-original-title">${escHtml(m.originalTitle)}</div>` : ''}
          <div class="card-meta">${genres}${runtime}</div>
          ${desc}
          ${showtimesHtml}
        </div>
      </div>
    `;
  }

  function openModal(idx) {
    const m = allMovies[idx];
    if (!m) return;

    const poster = m.poster
      ? `<img class="modal-poster" src="${escHtml(m.poster)}" alt="${escHtml(m.title)}" onerror="this.outerHTML='<div class=modal-poster-placeholder>🎬</div>'">`
      : `<div class="modal-poster-placeholder">🎬</div>`;

    const tags = [
      m.fsk ? `FSK ${m.fsk}` : null,
      m.runtime ? `${m.runtime} Min.` : null,
      ...((m.genre || '').split(',').filter(Boolean)),
      m.director ? `Regie: ${m.director}` : null,
    ].filter(Boolean).map(t => `<span class="modal-tag">${escHtml(t.trim())}</span>`).join('');

    const allDays = m.showtimes || [];

    const showtimesHtml = allDays.length > 0 ? `
      <div class="modal-showtimes">
        <div class="modal-showtimes-title">Alle Vorstellungen</div>
        ${allDays.map(day => `
          <div class="modal-day">
            <div class="modal-day-name">${escHtml(day.date)}</div>
            <div class="modal-times">
              ${day.times.map(t => {
                const bookUrl = t.href || 'https://www.uci-kinowelt.de/kinoprogramm/bad-oeynhausen/73/poster';
                return `
                  <a class="modal-time-slot" href="${bookUrl}" target="_blank" onclick="event.stopPropagation()">
                    ${escHtml(t.time)}
                    ${t.version ? `<span class="ver">${escHtml(t.version)}</span>` : ''}
                  </a>
                `;
              }).join('')}
            </div>
          </div>
        `).join('')}
      </div>
    ` : '';

    document.getElementById('modalContent').innerHTML = `
      <div class="modal-header">
        ${poster}
        <div class="modal-info">
          <div class="modal-title">${escHtml(m.title)}</div>
          ${m.originalTitle && m.originalTitle !== m.title ? `<div class="modal-orig">${escHtml(m.originalTitle)}</div>` : ''}
          <div class="modal-tags">${tags}</div>
          ${m.description ? `<p class="modal-desc">${escHtml(m.description)}</p>` : ''}
        </div>
      </div>
      ${showtimesHtml}
    `;

    document.getElementById('modalBackdrop').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal(e) {
    if (e.target === document.getElementById('modalBackdrop')) closeModalBtn();
  }

  function closeModalBtn() {
    document.getElementById('modalBackdrop').classList.remove('open');
    document.body.style.overflow = '';
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModalBtn();
  });

  function showError(msg) {
    document.getElementById('main').innerHTML = `
      <div class="error-state">
        <p><strong>Fehler beim Laden</strong></p>
        <p style="margin-top:8px;font-size:0.85rem;">${escHtml(msg)}</p>
        <p style="margin-top:12px;font-size:0.85rem;">
          <a href="https://www.uci-kinowelt.de/kinoprogramm/bad-oeynhausen/73/poster" target="_blank" style="color:var(--gold)">
            Direkt auf UCI-Kinowelt öffnen →
          </a>
        </p>
      </div>`;
  }

  function escHtml(str) {
    return String(str || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  // Initial load
  document.getElementById('loadingState'); // already shown
  loadMovies();
</script>
</body>
</html>
