<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UCI Kino Bad Oeynhausen – Kinoprogramm</title>
  <style>
    :root {
      --bg: #0d0d0f;
      --surface: #18181c;
      --card: #1e1e24;
      --border: #2a2a35;
      --gold: #e2a53a;
      --gold-dim: #a8762a;
      --text: #f0f0f0;
      --text-dim: #8a8a9a;
      --green: #4ade80;
      --blue: #60a5fa;
      --red: #f87171;
      --orange: #fb923c;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
    }

    /* HEADER */
    header {
      background: linear-gradient(135deg, #0d0d0f 0%, #1a1205 50%, #0d0d0f 100%);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      backdrop-filter: blur(12px);
    }

    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: var(--gold);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }

    .logo h1 {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }

    .logo span {
      font-size: 0.75rem;
      color: var(--gold);
      display: block;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .fetch-time {
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    .btn-refresh {
      background: var(--gold);
      color: #000;
      border: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-refresh:hover { background: #f0b84a; }
    .btn-refresh:active { transform: scale(0.97); }
    .btn-refresh.loading { opacity: 0.6; pointer-events: none; }

    .spin { display: inline-block; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* FILTERS */
    .filters-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 24px;
      position: sticky;
      top: 64px;
      z-index: 99;
    }

    .filters-inner {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .search-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      color: var(--text);
      font-size: 0.9rem;
      width: 240px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box:focus { border-color: var(--gold); }
    .search-box::placeholder { color: var(--text-dim); }

    .filter-tabs {
      display: flex;
      gap: 6px;
    }

    .filter-tab {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 14px;
      color: var(--text-dim);
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .filter-tab:hover { color: var(--text); border-color: var(--gold-dim); }
    .filter-tab.active { background: var(--gold); color: #000; border-color: var(--gold); font-weight: 600; }
    .filter-tab.fav-tab.active { background: #e8c84a; }

    /* WATCHLIST BUTTON */
    .fav-btn {
      position: absolute;
      top: 8px; right: 8px;
      width: 32px; height: 32px;
      border-radius: 50%;
      background: rgba(0,0,0,0.6);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      backdrop-filter: blur(4px);
      transition: transform 0.2s, background 0.2s;
      z-index: 5;
      line-height: 1;
    }
    .fav-btn:hover { transform: scale(1.15); }
    .fav-btn.active { background: rgba(226,165,58,0.85); }

    /* Watchlist-Karte: goldener linker Rand */
    .movie-card.is-fav { border-color: var(--gold-dim); }
    .movie-card.is-fav .card-title::before {
      content: '⭐ ';
      font-size: 0.8em;
    }

    /* ── Schon gesehen ── */
    .seen-btn {
      position: absolute;
      bottom: 8px; right: 8px;
      width: 32px; height: 32px;
      border-radius: 50%;
      background: rgba(0,0,0,0.6);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      backdrop-filter: blur(4px);
      transition: transform 0.2s, background 0.2s;
      z-index: 5;
      line-height: 1;
      color: var(--text-dim);
    }
    .seen-btn:hover { transform: scale(1.15); }
    .seen-btn.active { background: rgba(74,222,128,0.85); color: #000; }

    /* Gesehen-Overlay auf dem Poster */
    .seen-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.55);
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }
    .movie-card.is-seen .seen-overlay { opacity: 1; }
    .movie-card.is-seen .poster-wrapper img { filter: brightness(0.55) saturate(0.4); }

    /* Gesehen-Karte: grüner linker Rand */
    .movie-card.is-seen { border-color: rgba(74,222,128,0.35); }
    .movie-card.is-seen .card-title::after {
      content: ' ✓';
      color: #4ade80;
      font-size: 0.85em;
    }

    /* MAIN */
    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 32px 24px;
    }

    .section-title {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }

    .section-title .dot.upcoming { background: var(--blue); animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(74,222,128,0.4); }
      50% { opacity: 0.8; box-shadow: 0 0 0 6px rgba(74,222,128,0); }
    }

    .section-count {
      font-size: 0.85rem;
      color: var(--text-dim);
      font-weight: 400;
    }

    .movie-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 48px;
    }

    /* MOVIE CARD */
    .movie-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }

    .movie-card:hover {
      transform: translateY(-4px);
      border-color: var(--gold-dim);
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
    }

    .poster-wrapper {
      position: relative;
      aspect-ratio: 2/3;
      background: var(--surface);
      overflow: hidden;
    }

    .poster-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.4s;
    }

    .movie-card:hover .poster-wrapper img {
      transform: scale(1.04);
    }

    .poster-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: var(--text-dim);
      font-size: 0.8rem;
      text-align: center;
      padding: 16px;
    }

    .poster-placeholder .film-icon { font-size: 48px; opacity: 0.3; }

    .fsk-badge {
      position: absolute;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.75);
      border: 1.5px solid;
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 0.72rem;
      font-weight: 700;
      backdrop-filter: blur(4px);
    }

    .fsk-0 { border-color: var(--green); color: var(--green); }
    .fsk-6 { border-color: var(--green); color: var(--green); }
    .fsk-12 { border-color: var(--gold); color: var(--gold); }
    .fsk-16 { border-color: var(--orange); color: var(--orange); }
    .fsk-18 { border-color: var(--red); color: var(--red); }

    .version-badges {
      position: absolute;
      bottom: 10px;
      left: 10px;
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
    }

    .version-badge {
      background: rgba(0,0,0,0.75);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--text-dim);
      backdrop-filter: blur(4px);
    }

    .version-badge.imax   { border-color: var(--blue); color: var(--blue); }
    .version-badge.threeD { border-color: var(--gold); color: var(--gold); }
    .version-badge.surcharge { border-color: #f97316; color: #f97316; }
    .version-badge.included  { border-color: #4ade80; color: #4ade80; }

    .card-body {
      padding: 16px;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 4px;
      color: var(--text);
    }

    .card-original-title {
      font-size: 0.78rem;
      color: var(--text-dim);
      margin-bottom: 8px;
      font-style: italic;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .tag {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 7px;
      font-size: 0.72rem;
      color: var(--text-dim);
    }

    .runtime-tag { color: var(--text-dim); }

    .card-desc {
      font-size: 0.82rem;
      color: var(--text-dim);
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 14px;
    }

    .showtimes {
      border-top: 1px solid var(--border);
      padding-top: 12px;
    }

    .showtimes-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      margin-bottom: 8px;
    }

    .showtime-day {
      margin-bottom: 8px;
    }

    .showtime-date {
      font-size: 0.75rem;
      color: var(--gold);
      font-weight: 600;
      margin-bottom: 4px;
    }

    .showtime-times {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .showtime-slot {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 3px 8px;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--text);
      transition: background 0.15s, border-color 0.15s;
    }

    .showtime-slot:hover {
      background: var(--gold);
      border-color: var(--gold);
      color: #000;
    }

    .showtime-version {
      font-size: 0.65rem;
      color: var(--text-dim);
      margin-left: 2px;
    }

    .more-showtimes {
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-top: 4px;
    }

    /* LOADING / ERROR */
    .loading-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 24px;
      gap: 16px;
      color: var(--text-dim);
    }

    .loader {
      width: 48px;
      height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .error-state {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.3);
      border-radius: 12px;
      padding: 24px;
      text-align: center;
      color: var(--red);
      margin: 40px auto;
      max-width: 500px;
    }

    .empty-state {
      text-align: center;
      color: var(--text-dim);
      padding: 40px;
      font-size: 0.9rem;
    }

    /* MODAL */
    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      backdrop-filter: blur(6px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-backdrop.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      max-width: 740px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      transform: scale(0.95);
      transition: transform 0.2s;
    }

    .modal-backdrop.open .modal { transform: scale(1); }

    .modal-header {
      display: flex;
      gap: 20px;
      padding: 24px;
      border-bottom: 1px solid var(--border);
    }

    .modal-poster {
      width: 120px;
      height: 180px;
      border-radius: 8px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--surface);
    }

    .modal-poster-placeholder {
      width: 120px;
      height: 180px;
      border-radius: 8px;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      flex-shrink: 0;
    }

    .modal-info { flex: 1; }

    .modal-title {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .modal-orig { font-size: 0.85rem; color: var(--text-dim); font-style: italic; margin-bottom: 12px; }

    .modal-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 14px;
    }

    .modal-tag {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 10px;
      font-size: 0.8rem;
      color: var(--text-dim);
    }

    .modal-desc {
      font-size: 0.9rem;
      line-height: 1.7;
      color: var(--text-dim);
    }

    /* --- Ratings --- */
    .ratings-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    .rating-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 11px;
      border-radius: 8px;
      font-size: 0.83rem;
      font-weight: 700;
      text-decoration: none;
      transition: opacity 0.2s, transform 0.15s;
      cursor: pointer;
    }
    .rating-badge:hover { opacity: 0.85; transform: scale(1.04); }
    .rating-badge.imdb  { background: #f5c518; color: #000; }
    .rating-badge.rt-fresh    { background: #fa320a; color: #fff; }
    .rating-badge.rt-rotten   { background: #5c5c5c; color: #fff; }
    .rating-badge.rt-none     { background: #3a3a3a; color: #aaa; }
    .rating-badge.loading-ratings { background: var(--surface); color: var(--text-dim); pointer-events: none; }
    .rating-badge img { width: 15px; height: 15px; object-fit: contain; }

    /* --- Abstimmung --- */
    .poll-btn {
      background: none;
      border: 1.5px solid var(--border);
      color: var(--text-dim);
      border-radius: 8px;
      padding: 7px 14px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .poll-btn:hover { border-color: var(--gold); color: var(--gold); }
    .poll-btn.active { background: var(--gold); border-color: var(--gold); color: #000; font-weight: 700; }

    /* Auswahlmodus: Karte selektierbar */
    body.poll-mode .movie-card { cursor: pointer; }
    body.poll-mode .movie-card:hover { border-color: var(--gold-dim); }
    .movie-card.poll-selected { border-color: var(--gold) !important; box-shadow: 0 0 0 2px var(--gold); }
    .movie-card.poll-selected .poster-wrapper::after {
      content: '✓';
      position: absolute;
      inset: 0;
      background: rgba(226,165,58,0.35);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem;
      font-weight: 900;
      color: #fff;
      pointer-events: none;
    }

    /* Sticky Bottom Bar im Auswahlmodus */
    .poll-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      z-index: 200;
      transform: translateY(100%);
      transition: transform 0.3s ease;
    }
    .poll-bar.visible { transform: translateY(0); }
    .poll-bar-info { font-size: 0.9rem; color: var(--text-dim); }
    .poll-bar-info strong { color: var(--text); }
    .poll-bar-actions { display: flex; gap: 10px; }
    .poll-bar-cancel { background: none; border: 1px solid var(--border); color: var(--text-dim); border-radius: 8px; padding: 8px 16px; cursor: pointer; font-size: 0.85rem; }
    .poll-bar-create { background: var(--gold); border: none; color: #000; border-radius: 8px; padding: 8px 18px; font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: background 0.2s; }
    .poll-bar-create:disabled { background: var(--border); color: var(--text-dim); cursor: not-allowed; }
    .poll-bar-create:not(:disabled):hover { background: #f0c84a; }

    /* Abstimmungs-Ansicht (Share-Link geöffnet) */
    .vote-header {
      text-align: center;
      padding: 32px 24px 16px;
    }
    .vote-header h1 { font-size: 1.4rem; font-weight: 800; margin-bottom: 6px; }
    .vote-header p { font-size: 0.9rem; color: var(--text-dim); }

    .vote-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
      padding: 16px 24px 32px;
      max-width: 800px;
      margin: 0 auto;
    }

    .vote-card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.2s, transform 0.15s;
      display: flex;
      flex-direction: column;
    }
    .vote-card:hover { border-color: var(--gold-dim); transform: translateY(-2px); }
    .vote-card.voted-for { border-color: var(--gold); box-shadow: 0 0 0 2px var(--gold); }

    .vote-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; }
    .vote-card-body { padding: 10px 12px 12px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .vote-card-title { font-size: 0.88rem; font-weight: 700; line-height: 1.3; }
    .vote-card-meta { font-size: 0.75rem; color: var(--text-dim); }
    .vote-card-btn {
      margin-top: auto;
      width: 100%;
      padding: 8px;
      border-radius: 8px;
      border: none;
      background: var(--border);
      color: var(--text);
      font-weight: 700;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .vote-card-btn:hover { background: var(--gold-dim); }
    .vote-card.voted-for .vote-card-btn { background: var(--gold); color: #000; }

    /* Ergebnis-Bars */
    .result-bar-wrap { margin-top: 6px; }
    .result-bar-label { font-size: 0.72rem; color: var(--text-dim); display: flex; justify-content: space-between; margin-bottom: 3px; }
    .result-bar-track { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .result-bar-fill { height: 100%; background: var(--gold); border-radius: 3px; transition: width 0.6s ease; }

    /* Geteilter Link Modal */
    .share-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 16px;
    }
    .share-url {
      flex: 1;
      font-size: 0.85rem;
      color: var(--gold);
      word-break: break-all;
      font-family: monospace;
    }
    .copy-btn {
      background: var(--gold);
      border: none;
      border-radius: 7px;
      padding: 6px 14px;
      font-weight: 700;
      font-size: 0.82rem;
      color: #000;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }
    .copy-btn:hover { background: #f0c84a; }
    .whatsapp-btn {
      display: block;
      width: 100%;
      text-align: center;
      margin-top: 10px;
      padding: 10px;
      background: #25D366;
      color: #fff;
      border-radius: 8px;
      font-weight: 700;
      font-size: 0.9rem;
      text-decoration: none;
      transition: background 0.2s;
    }
    .whatsapp-btn:hover { background: #1ebe5b; }

    /* --- Gemeinsame Watchlist --- */

    /* Gemeinsame Watchlist Ansicht */
    .slist-view { max-width: 700px; margin: 0 auto; padding: 0 16px 40px; }
    .slist-header { text-align: center; padding: 28px 0 20px; }
    .slist-header h1 { font-size: 1.4rem; font-weight: 800; margin-bottom: 6px; }
    .slist-header p { font-size: 0.88rem; color: var(--text-dim); }

    .slist-name-box {
      display: flex;
      gap: 10px;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      margin-bottom: 20px;
    }
    .slist-name-box input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 0.9rem;
    }
    .slist-name-box label { font-size: 0.82rem; color: var(--text-dim); white-space: nowrap; }
    .slist-name-save {
      background: var(--gold);
      border: none;
      border-radius: 7px;
      padding: 6px 14px;
      font-weight: 700;
      font-size: 0.82rem;
      color: #000;
      cursor: pointer;
    }

    .slist-films { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
    .slist-film-item {
      display: flex;
      gap: 12px;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      transition: border-color 0.2s;
    }
    .slist-film-item:hover { border-color: var(--gold-dim); }
    .slist-film-poster { width: 44px; height: 64px; object-fit: cover; border-radius: 6px; flex-shrink: 0; background: var(--border); }
    .slist-film-info { flex: 1; min-width: 0; }
    .slist-film-title { font-weight: 700; font-size: 0.9rem; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .slist-film-meta { font-size: 0.75rem; color: var(--text-dim); }
    .slist-film-by { font-size: 0.72rem; color: var(--gold); margin-top: 3px; }
    .slist-remove-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 28px; height: 28px;
      color: var(--text-dim);
      font-size: 1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }
    .slist-remove-btn:hover { border-color: #ef4444; color: #ef4444; }

    .slist-empty { text-align: center; padding: 40px; color: var(--text-dim); font-size: 0.9rem; }

    .slist-add-section h3 { font-size: 1rem; font-weight: 700; margin-bottom: 12px; }
    .slist-program-grid { display: flex; flex-direction: column; gap: 8px; }
    .slist-program-item {
      display: flex;
      gap: 12px;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 12px;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .slist-program-item:hover { border-color: var(--gold-dim); }
    .slist-program-item.already-added { opacity: 0.4; pointer-events: none; }
    .slist-program-poster { width: 36px; height: 52px; object-fit: cover; border-radius: 5px; flex-shrink: 0; background: var(--border); }
    .slist-program-title { flex: 1; font-size: 0.88rem; font-weight: 600; }
    .slist-add-btn {
      background: var(--gold);
      border: none;
      border-radius: 7px;
      padding: 5px 12px;
      font-weight: 700;
      font-size: 0.8rem;
      color: #000;
      cursor: pointer;
      white-space: nowrap;
    }
    .slist-sync-info { font-size: 0.75rem; color: var(--text-dim); text-align: center; margin-top: 16px; }

    .slist-showtimes { margin: 6px 0 4px; display: flex; flex-direction: column; gap: 4px; }
    .slist-showday { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
    .slist-showday-label { font-size: 0.72rem; color: var(--gold); font-weight: 600; white-space: nowrap; min-width: 72px; }
    .slist-showday-times { display: flex; flex-wrap: wrap; gap: 4px; }
    .slist-showtime {
      font-size: 0.72rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 2px 6px;
      white-space: nowrap;
    }
    .slist-showtime em { font-style: normal; color: var(--text-dim); font-size: 0.65rem; }
    .slist-showtime-more { font-size: 0.68rem; color: var(--text-dim); padding: 2px 4px; }
    .slist-no-showtimes { font-size: 0.72rem; color: var(--text-dim); margin: 4px 0; font-style: italic; }

    .slist-status { font-size: 0.65rem; font-weight: 700; padding: 1px 6px; border-radius: 4px; margin-right: 5px; vertical-align: middle; flex-shrink: 0; }
    .slist-status.current  { background: rgba(74,222,128,0.15); color: #4ade80; border: 1px solid rgba(74,222,128,0.3); }
    .slist-status.upcoming { background: rgba(226,165,58,0.15); color: var(--gold); border: 1px solid rgba(226,165,58,0.3); }

    /* --- Trailer --- */
    .trailer-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      margin-top: 14px;
      padding: 8px 18px;
      background: #cc0000;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      letter-spacing: 0.02em;
    }
    .trailer-btn:hover { background: #e00; transform: scale(1.03); }
    .trailer-btn:active { transform: scale(0.97); }
    .trailer-btn svg { width: 16px; height: 16px; fill: #fff; flex-shrink: 0; }
    .trailer-btn.loading { opacity: 0.7; pointer-events: none; }

    .trailer-embed {
      margin: 0 24px 0;
      border-radius: 10px;
      overflow: hidden;
      background: #000;
      position: relative;
      aspect-ratio: 16/9;
      display: none;
    }
    .trailer-embed.visible { display: block; }
    .trailer-embed iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    .trailer-embed-close {
      position: absolute;
      top: 8px; right: 8px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 28px; height: 28px;
      font-size: 1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      z-index: 10;
      transition: background 0.2s;
    }
    .trailer-embed-close:hover { background: rgba(200,0,0,0.8); }

    .modal-showtimes {
      padding: 24px;
    }

    .modal-showtimes-title {
      font-size: 1rem;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .modal-day {
      margin-bottom: 14px;
    }

    .modal-day-name {
      font-size: 0.85rem;
      color: var(--gold);
      font-weight: 600;
      margin-bottom: 6px;
    }

    .modal-times {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .modal-time-slot {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 0.85rem;
      font-weight: 500;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      text-decoration: none;
      color: var(--text);
    }

    .modal-time-slot:hover {
      background: var(--gold);
      border-color: var(--gold);
      color: #000;
    }

    .modal-time-slot .ver {
      font-size: 0.65rem;
      opacity: 0.7;
    }

    .aufpreis-tag {
      font-size: 0.62rem;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 4px;
      white-space: nowrap;
    }
    .aufpreis-tag.extra  { background: rgba(249,115,22,0.18); color: #f97316; border: 1px solid rgba(249,115,22,0.4); }
    .aufpreis-tag.free   { background: rgba(74,222,128,0.12); color: #4ade80; border: 1px solid rgba(74,222,128,0.3); }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 50%;
      width: 36px;
      height: 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      font-size: 1.2rem;
      transition: background 0.15s;
    }

    .modal-close:hover { background: var(--border); }

    /* DIVIDER */
    .section-divider {
      margin: 12px 0 32px;
      border: none;
      border-top: 1px solid var(--border);
    }

    /* FOOTER */
    footer {
      text-align: center;
      padding: 24px;
      color: var(--text-dim);
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
      margin-top: 40px;
    }

    footer a { color: var(--gold); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* =====================
       MOBILE (≤ 640px)
    ===================== */
    @media (max-width: 640px) {

      /* --- Header --- */
      header { padding: 0 16px; }
      .header-inner { height: 54px; }
      .logo h1 { font-size: 1rem; }
      .logo span { font-size: 0.68rem; }
      .logo-icon { width: 30px; height: 30px; font-size: 16px; border-radius: 6px; }
      .fetch-time { display: none; }
      .btn-refresh {
        padding: 7px 10px;
        font-size: 0;   /* Text ausblenden */
        gap: 0;
        border-radius: 50%;
        width: 34px; height: 34px;
        justify-content: center;
      }
      #refreshIcon { font-size: 18px; }

      /* --- Filterleiste --- */
      .filters-bar { padding: 10px 16px; top: 54px; }
      .filters-inner { flex-direction: column; gap: 8px; align-items: stretch; }
      .search-box { width: 100%; font-size: 1rem; padding: 10px 14px; }
      .filter-tabs { gap: 6px; overflow-x: auto; padding-bottom: 2px; }
      .filter-tabs::-webkit-scrollbar { display: none; }
      .filter-tab { padding: 7px 16px; font-size: 0.82rem; flex-shrink: 0; }

      /* --- Main --- */
      main { padding: 16px; }
      .section-title { font-size: 1.1rem; margin-bottom: 12px; }

      /* --- Film-Grid: eine Spalte, horizontale Karten --- */
      .movie-grid {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 32px;
      }

      .movie-card {
        display: flex;
        flex-direction: row;
        border-radius: 12px;
        min-height: 0;
      }
      .movie-card:hover { transform: none; } /* kein hover-lift auf touch */
      .movie-card:active { transform: scale(0.98); }

      /* Poster: kleines Thumbnail links, füllt immer die volle Kartenhöhe */
      .poster-wrapper {
        width: 90px;
        min-width: 90px;
        aspect-ratio: unset;
        height: auto;
        align-self: stretch;
        border-radius: 12px 0 0 12px;
        flex-shrink: 0;
      }
      .poster-wrapper img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center top;
      }
      .movie-card:hover .poster-wrapper img { transform: none; }

      .fsk-badge {
        top: 6px; left: 6px;
        font-size: 0.62rem;
        padding: 1px 5px;
      }
      .fav-btn {
        top: 6px; right: 6px;
        width: 28px; height: 28px;
        font-size: 14px;
      }
      .seen-btn {
        bottom: 6px; right: 6px;
        width: 28px; height: 28px;
        font-size: 13px;
      }
      .version-badges { bottom: 6px; left: 6px; gap: 2px; }
      .version-badge { font-size: 0.58rem; padding: 1px 4px; }

      /* Card Body: rechts vom Poster */
      .card-body {
        padding: 10px 12px;
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      .card-title {
        font-size: 0.92rem;
        margin-bottom: 3px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .card-original-title { font-size: 0.72rem; margin-bottom: 4px; }
      .card-meta { gap: 5px; margin-bottom: 0; }
      .tag { font-size: 0.68rem; padding: 1px 6px; }

      /* Beschreibung auf Mobil ausblenden — spart Platz */
      .card-desc { display: none; }

      /* Vorstellungen kompakter */
      .showtimes { padding-top: 8px; border-top: 1px solid var(--border); }
      .showtimes-label { display: none; }
      .showtime-day { margin-bottom: 5px; }
      .showtime-date { font-size: 0.7rem; margin-bottom: 3px; }
      .showtime-slot { padding: 2px 6px; font-size: 0.72rem; }
      .more-showtimes { font-size: 0.68rem; }

      /* --- Modal als Bottom-Sheet --- */
      .modal-backdrop {
        align-items: flex-end;
        padding: 0;
      }

      .modal {
        border-radius: 20px 20px 0 0;
        max-height: 92vh;
        width: 100%;
        max-width: 100%;
        transform: translateY(100%);
        transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
        border-bottom: none;
      }

      .modal-backdrop.open .modal {
        transform: translateY(0);
      }

      /* Drag-Indikator oben */
      .modal::before {
        content: '';
        display: block;
        width: 36px;
        height: 4px;
        background: var(--border);
        border-radius: 2px;
        margin: 12px auto 0;
      }

      .modal-close {
        top: 12px; right: 12px;
        width: 30px; height: 30px;
        font-size: 1rem;
      }

      .modal-header {
        flex-direction: row;
        gap: 14px;
        padding: 16px 16px 14px;
      }

      .modal-poster {
        width: 90px;
        height: 130px;
        border-radius: 8px;
      }
      .modal-poster-placeholder {
        width: 90px;
        height: 130px;
        font-size: 32px;
        border-radius: 8px;
      }

      .modal-title { font-size: 1.1rem; }
      .modal-orig { font-size: 0.78rem; }
      .modal-tag { font-size: 0.74rem; padding: 2px 8px; }
      .modal-desc { font-size: 0.82rem; line-height: 1.55; }

      .modal-showtimes { padding: 16px; }
      .modal-showtimes-title { font-size: 0.95rem; margin-bottom: 12px; }
      .modal-day { margin-bottom: 12px; }
      .modal-day-name { font-size: 0.8rem; }

      .modal-time-slot {
        padding: 8px 12px;
        font-size: 0.82rem;
        min-width: 58px;
        border-radius: 10px;
      }

      /* Footer kleiner */
      footer { padding: 16px; font-size: 0.72rem; }

      /* Trailer auf Mobil */
      .trailer-btn { font-size: 0.82rem; padding: 7px 14px; margin-top: 10px; }
      .trailer-embed { margin: 0 16px 0; border-radius: 8px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">🎬</div>
      <h1>UCI Kino <span>Bad Oeynhausen · Luxe</span></h1>
    </div>
    <div class="header-actions">
      <span class="fetch-time" id="fetchTime"></span>
      <button class="poll-btn" id="pollBtn" onclick="togglePollMode()">🗳️ Abstimmung</button>
      <button class="btn-refresh" id="refreshBtn" onclick="loadMovies(true)">
        <span id="refreshIcon">↻</span> Aktualisieren
      </button>
    </div>
  </div>
</header>

<div class="filters-bar">
  <div class="filters-inner">
    <input class="search-box" type="search" id="searchInput" placeholder="Film suchen…" oninput="renderMovies()" />
    <div class="filter-tabs">
      <button class="filter-tab active" data-filter="all" onclick="setFilter('all')">Alle</button>
      <button class="filter-tab" data-filter="current" onclick="setFilter('current')">Jetzt im Kino</button>
      <button class="filter-tab" data-filter="upcoming" onclick="setFilter('upcoming')">Demnächst</button>
      <button class="filter-tab fav-tab" data-filter="favs" onclick="setFilter('favs')">🎬 Watchlist</button>
      <button class="filter-tab" data-filter="group" onclick="setFilter('group')">👥 Gemeinsam</button>
      <button class="filter-tab" data-filter="seen" onclick="setFilter('seen')">✓ Gesehen</button>
    </div>
  </div>
</div>

<main id="main">
  <div class="loading-state" id="loadingState">
    <div class="loader"></div>
    <p>Lade Kinoprogramm…</p>
  </div>
</main>

<!-- Abstimmung: Sticky Bottom Bar -->
<div class="poll-bar" id="pollBar">
  <div class="poll-bar-info">
    <strong id="pollCount">0</strong> <span id="pollCountLabel">Filme ausgewählt</span>
    <span style="font-size:0.8rem;margin-left:8px;">(min. 2, max. 5)</span>
  </div>
  <div class="poll-bar-actions">
    <button class="poll-bar-cancel" onclick="togglePollMode()">Abbrechen</button>
    <button class="poll-bar-create" id="pollCreateBtn" disabled onclick="createPoll()">Link erstellen</button>
  </div>
</div>

<div id="modalBackdrop" class="modal-backdrop" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModalBtn()">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<footer>
  Daten von <a href="https://www.uci-kinowelt.de/kinoprogramm/bad-oeynhausen/73/poster" target="_blank">UCI Kinowelt Bad Oeynhausen</a>
  · Automatisch aktualisiert
</footer>

<script>
  let allMovies = [];
  let activeFilter = 'all';

  // ── Schon gesehen (localStorage) ─────────────────────
  function getSeen() {
    try { return new Set(JSON.parse(localStorage.getItem('uci-seen') || '[]')); }
    catch { return new Set(); }
  }
  function saveSeen(set) {
    localStorage.setItem('uci-seen', JSON.stringify([...set]));
  }
  function toggleSeen(filmId, btn) {
    const seen = getSeen();
    const card = btn.closest('.movie-card');
    if (seen.has(filmId)) {
      seen.delete(filmId);
      btn.classList.remove('active');
      btn.textContent = '○';
      card.classList.remove('is-seen');
    } else {
      seen.add(filmId);
      btn.classList.add('active');
      btn.textContent = '✓';
      card.classList.add('is-seen');
    }
    saveSeen(seen);
  }

  // ── UCI Abo Aufpreise ─────────────────────────────────
  // Quelle: UCI Kinoabo-Bedingungen (Stand 2025)
  // UCI Unlimited Premium Card:
  // IMAX: +3,00 € Aufpreis — alles andere inklusive
  const ABO_SURCHARGES = {
    'IMAX':   { label: '+3,00 €', cls: 'extra' },
    'ISENSE': { label: 'Abo ✓',  cls: 'free'  },
    '3D':     { label: 'Abo ✓',  cls: 'free'  },
    'OV':     { label: 'Abo ✓',  cls: 'free'  },
    'OMU':    { label: 'Abo ✓',  cls: 'free'  },
  };

  // Gibt { label, cls } für eine version-Zeichenkette zurück
  // version kann mehrere Teile haben, z.B. "IMAX 3D" → nimm den teuersten
  function getAufpreis(version) {
    if (!version) return { label: 'Abo ✓', cls: 'free' };
    const v = version.toUpperCase();
    if (v.includes('IMAX'))   return ABO_SURCHARGES['IMAX'];
    if (v.includes('ISENSE')) return ABO_SURCHARGES['ISENSE'];
    if (v.includes('3D'))     return ABO_SURCHARGES['3D'];
    if (v.includes('OV') || v.includes('OMU')) return ABO_SURCHARGES['OV'];
    return { label: 'Abo ✓', cls: 'free' };
  }
  let isLoading = false;

  // ── Watchlist (localStorage) ──────────────────────────
  function getFavs() {
    try { return new Set(JSON.parse(localStorage.getItem('uci-watchlist') || '[]')); }
    catch { return new Set(); }
  }
  function saveFavs(set) {
    localStorage.setItem('uci-watchlist', JSON.stringify([...set]));
  }
  function toggleFav(filmId, btn) {
    const favs = getFavs();
    if (favs.has(filmId)) {
      favs.delete(filmId);
      btn.classList.remove('active');
      btn.textContent = '☆';
      btn.closest('.movie-card').classList.remove('is-fav');
    } else {
      favs.add(filmId);
      btn.classList.add('active');
      btn.textContent = '🎬';
      btn.closest('.movie-card').classList.add('is-fav');
    }
    saveFavs(favs);
    updateFavTab(favs.size);
  }
  function updateFavTab(count) {
    const tab = document.querySelector('.fav-tab');
    if (tab) tab.textContent = count > 0 ? `🎬 Watchlist (${count})` : '🎬 Watchlist';
  }

  async function loadMovies(force = false) {
    if (isLoading) return; // bereits am laden → ignorieren
    isLoading = true;

    const btn = document.getElementById('refreshBtn');
    const icon = document.getElementById('refreshIcon');
    btn.classList.add('loading');
    icon.classList.add('spin');
    icon.textContent = '↻';

    // AbortController: bricht Anfrage nach 25 Sekunden ab
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 25000);

    try {
      const url = force ? '/api/refresh' : '/api/movies';
      const res = await fetch(url, { signal: controller.signal });
      clearTimeout(timeout);

      if (!res.ok) throw new Error(`Server-Fehler: ${res.status}`);
      const json = await res.json();

      if (!json.success) throw new Error(json.error || 'Unbekannter Fehler');

      allMovies = json.movies || [];

      const t = new Date(json.fetchedAt);
      document.getElementById('fetchTime').textContent =
        'Stand: ' + t.toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' }) + ' Uhr';

      renderMovies();
    } catch (err) {
      clearTimeout(timeout);
      if (err.name === 'AbortError') {
        showError('Zeitüberschreitung — UCI antwortet zu langsam. Bitte erneut versuchen.');
      } else {
        showError(err.message);
      }
    } finally {
      isLoading = false;
      btn.classList.remove('loading');
      icon.classList.remove('spin');
    }
  }

  function setFilter(f) {
    activeFilter = f;
    document.querySelectorAll('.filter-tab').forEach(el => {
      el.classList.toggle('active', el.dataset.filter === f);
    });
    renderMovies();
  }

  function renderMovies() {
    const main = document.getElementById('main');
    const search = document.getElementById('searchInput').value.toLowerCase().trim();

    let movies = allMovies;

    if (search) {
      movies = movies.filter(m =>
        m.title.toLowerCase().includes(search) ||
        (m.genre || '').toLowerCase().includes(search) ||
        (m.originalTitle || '').toLowerCase().includes(search)
      );
    }

    const today = new Date();
    today.setHours(0, 0, 0, 0);

    const favs = getFavs();
    updateFavTab(favs.size);

    let current = movies.filter(m => !m.isUpcoming);
    let upcoming = movies.filter(m => m.isUpcoming);

    const seen = getSeen();

    // Gemeinsame Watchlist hat eigene Ansicht
    if (activeFilter === 'group') {
      renderGroupWatchlist();
      return;
    }

    if (activeFilter === 'current')  upcoming = [];
    if (activeFilter === 'upcoming') current = [];
    if (activeFilter === 'favs') {
      current  = current.filter(m => favs.has(m.filmId));
      upcoming = upcoming.filter(m => favs.has(m.filmId));
    }
    if (activeFilter === 'seen') {
      current  = current.filter(m => seen.has(m.filmId));
      upcoming = upcoming.filter(m => seen.has(m.filmId));
    }

    if (current.length === 0 && upcoming.length === 0) {
      if (allMovies.length === 0) {
        main.innerHTML = `
          <div class="error-state">
            <p><strong>Keine Filmdaten gefunden.</strong></p>
            <p style="margin-top:8px;font-size:0.85rem;">Die UCI-Website hat möglicherweise ihre Struktur geändert. Bitte versuche es später erneut oder besuche <a href="https://www.uci-kinowelt.de/kinoprogramm/bad-oeynhausen/73/poster" target="_blank" style="color:var(--gold)">uci-kinowelt.de</a> direkt.</p>
          </div>`;
      } else if (activeFilter === 'favs') {
        main.innerHTML = `
          <div class="empty-state" style="padding:60px 24px;">
            <div style="font-size:48px;margin-bottom:16px;">🎬</div>
            <p style="font-size:1rem;font-weight:600;margin-bottom:8px;">Deine Watchlist ist leer</p>
            <p style="font-size:0.85rem;">Tippe auf 🎬 auf einer Filmkarte um ihn hier zu speichern.</p>
          </div>`;
      } else if (activeFilter === 'seen') {
        main.innerHTML = `
          <div class="empty-state" style="padding:60px 24px;">
            <div style="font-size:48px;margin-bottom:16px;">✓</div>
            <p style="font-size:1rem;font-weight:600;margin-bottom:8px;">Noch keine Filme gesehen</p>
            <p style="font-size:0.85rem;">Tippe auf ○ auf einer Filmkarte um ihn als gesehen zu markieren.</p>
          </div>`;
      } else {
        main.innerHTML = `<div class="empty-state">Keine Filme gefunden.</div>`;
      }
      return;
    }

    let html = '';

    if (current.length > 0) {
      html += `
        <h2 class="section-title">
          <span class="dot"></span>
          Jetzt im Kino
          <span class="section-count">${current.length} ${current.length === 1 ? 'Film' : 'Filme'}</span>
        </h2>
        <div class="movie-grid">
          ${current.map(m => movieCard(m)).join('')}
        </div>
        <hr class="section-divider">
      `;
    }

    if (upcoming.length > 0) {
      html += `
        <h2 class="section-title">
          <span class="dot upcoming"></span>
          Demnächst
          <span class="section-count">${upcoming.length} ${upcoming.length === 1 ? 'Film' : 'Filme'}</span>
        </h2>
        <div class="movie-grid">
          ${upcoming.map(m => movieCard(m)).join('')}
        </div>
      `;
    }

    main.innerHTML = html;
  }

  function movieCard(m) {
    const poster = m.poster
      ? `<img src="${escHtml(m.poster)}" alt="${escHtml(m.title)}" loading="lazy" onerror="this.parentElement.innerHTML='<div class=poster-placeholder><span class=film-icon>🎬</span>${escHtml(m.title)}</div>'">`
      : `<div class="poster-placeholder"><span class="film-icon">🎬</span><span>${escHtml(m.title)}</span></div>`;

    const fskClass = ['0','6','12','16','18'].includes(String(m.fsk)) ? `fsk-${m.fsk}` : '';
    const fskBadge = m.fsk ? `<span class="fsk-badge ${fskClass}">FSK ${m.fsk}</span>` : '';

    const versions = new Set();
    (m.showtimes || []).forEach(day => day.times.forEach(t => {
      if (t.version) versions.add(t.version.toUpperCase());
    }));
    const versionBadges = [...versions].slice(0, 3).map(v => {
      const aufpreis = getAufpreis(v);
      const cls = aufpreis.cls === 'extra' ? 'surcharge' : 'included';
      return `<span class="version-badge ${cls}" title="${aufpreis.label}">${escHtml(v)}</span>`;
    }).join('');

    const genres = m.genre ? m.genre.split(',').slice(0, 2).map(g =>
      `<span class="tag">${escHtml(g.trim())}</span>`
    ).join('') : '';

    const runtime = m.runtime ? `<span class="tag runtime-tag">${m.runtime} Min.</span>` : '';

    const desc = m.description ? `<p class="card-desc">${escHtml(m.description)}</p>` : '';

    // Show only first 2 days of showtimes on card
    const shownDays = (m.showtimes || []).slice(0, 2);
    const moreDays = (m.showtimes || []).length - shownDays.length;

    const showtimesHtml = shownDays.length > 0 ? `
      <div class="showtimes">
        <div class="showtimes-label">Vorstellungen</div>
        ${shownDays.map(day => `
          <div class="showtime-day">
            <div class="showtime-date">${escHtml(day.date)}</div>
            <div class="showtime-times">
              ${day.times.slice(0, 5).map(t => `
                <span class="showtime-slot">
                  ${escHtml(t.time)}${t.version ? `<span class="showtime-version">${escHtml(t.version)}</span>` : ''}
                </span>
              `).join('')}
              ${day.times.length > 5 ? `<span class="showtime-slot" style="color:var(--text-dim)">+${day.times.length-5}</span>` : ''}
            </div>
          </div>
        `).join('')}
        ${moreDays > 0 ? `<div class="more-showtimes">+ ${moreDays} weitere Tag${moreDays === 1 ? '' : 'e'}</div>` : ''}
      </div>
    ` : '';

    const idx = allMovies.indexOf(m);
    const isFav  = getFavs().has(m.filmId);
    const isSeen = getSeen().has(m.filmId);

    return `
      <div class="movie-card${isFav ? ' is-fav' : ''}${isSeen ? ' is-seen' : ''}" onclick="handleCardClick(event, '${m.filmId}', ${idx})">
        <div class="poster-wrapper">
          ${poster}
          <div class="seen-overlay">✓</div>
          ${fskBadge}
          <button class="fav-btn${isFav ? ' active' : ''}"
            onclick="event.stopPropagation(); toggleFav('${m.filmId}', this)"
            title="${isFav ? 'Von Watchlist entfernen' : 'Zur Watchlist hinzufügen'}">
            ${isFav ? '🎬' : '+'}
          </button>
          <button class="seen-btn${isSeen ? ' active' : ''}"
            onclick="event.stopPropagation(); toggleSeen('${m.filmId}', this)"
            title="${isSeen ? 'Als nicht gesehen markieren' : 'Als gesehen markieren'}">
            ${isSeen ? '✓' : '○'}
          </button>
          ${versionBadges ? `<div class="version-badges">${versionBadges}</div>` : ''}
        </div>
        <div class="card-body">
          <div class="card-title">${escHtml(m.title)}</div>
          ${m.originalTitle && m.originalTitle !== m.title ? `<div class="card-original-title">${escHtml(m.originalTitle)}</div>` : ''}
          <div class="card-meta">${genres}${runtime}</div>
          ${desc}
          ${showtimesHtml}
        </div>
      </div>
    `;
  }

  function openModal(idx) {
    const m = allMovies[idx];
    if (!m) return;

    const poster = m.poster
      ? `<img class="modal-poster" src="${escHtml(m.poster)}" alt="${escHtml(m.title)}" onerror="this.outerHTML='<div class=modal-poster-placeholder>🎬</div>'">`
      : `<div class="modal-poster-placeholder">🎬</div>`;

    const tags = [
      m.fsk ? `FSK ${m.fsk}` : null,
      m.runtime ? `${m.runtime} Min.` : null,
      ...((m.genre || '').split(',').filter(Boolean)),
      m.director ? `Regie: ${m.director}` : null,
    ].filter(Boolean).map(t => `<span class="modal-tag">${escHtml(t.trim())}</span>`).join('');

    const allDays = m.showtimes || [];

    const showtimesHtml = allDays.length > 0 ? `
      <div class="modal-showtimes">
        <div class="modal-showtimes-title">Alle Vorstellungen</div>
        ${allDays.map(day => `
          <div class="modal-day">
            <div class="modal-day-name">${escHtml(day.date)}</div>
            <div class="modal-times">
              ${day.times.map(t => {
                const bookUrl = t.href || 'https://www.uci-kinowelt.de/kinoprogramm/bad-oeynhausen/73/poster';
                const aufpreis = getAufpreis(t.version);
                return `
                  <a class="modal-time-slot" href="${bookUrl}" target="_blank" onclick="event.stopPropagation()">
                    ${escHtml(t.time)}
                    ${t.version ? `<span class="ver">${escHtml(t.version)}</span>` : ''}
                    <span class="aufpreis-tag ${aufpreis.cls}">${aufpreis.label}</span>
                  </a>
                `;
              }).join('')}
            </div>
          </div>
        `).join('')}

    document.getElementById('modalContent').innerHTML = `
      <div class="modal-header">
        ${poster}
        <div class="modal-info">

          <div class="ratings-row" id="ratingsRow">
            <span class="rating-badge loading-ratings">⭐ Lade…</span>
          </div>
          ${m.description ? `<p class="modal-desc">${escHtml(m.description)}</p>` : ''}
          <button class="trailer-btn" id="trailerBtn" onclick="loadTrailer(this.dataset.title)" data-title="${escHtml(m.title)}">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            Trailer
          </button>
        </div>
      </div>
      <div class="trailer-embed" id="trailerEmbed">
        <button class="trailer-embed-close" onclick="closeTrailer()">✕</button>
        <iframe id="trailerIframe" allowfullscreen allow="autoplay; encrypted-media"></iframe>
      </div>
      ${showtimesHtml}
    `;

    document.getElementById('modalBackdrop').classList.add('open');
    document.body.style.overflow = 'hidden';

    // Ratings asynchron nachladen
    loadRatings(m.title, m.firstDate ? new Date(m.firstDate).getFullYear() : null);
  }

  function closeModal(e) {
    if (e.target === document.getElementById('modalBackdrop')) closeModalBtn();
  }

  function closeModalBtn() {
    closeTrailer();
    document.getElementById('modalBackdrop').classList.remove('open');
    document.body.style.overflow = '';
  }

  async function loadTrailer(title, btnEl) {
    const btn = btnEl || document.getElementById('trailerBtn');
    const embed = document.getElementById('trailerEmbed');
    const iframe = document.getElementById('trailerIframe');
    if (!btn || !embed || !iframe) return;

    // Toggle off if already playing
    if (embed.classList.contains('visible')) {
      closeTrailer();
      return;
    }

    btn.classList.add('loading');
    btn.textContent = 'Lade…';

    try {
      const res = await fetch(`/api/trailer?title=${encodeURIComponent(title)}`);
      const data = await res.json();
      if (data.videoId) {
        iframe.src = `https://www.youtube-nocookie.com/embed/${data.videoId}?autoplay=1&rel=0`;
        embed.classList.add('visible');
        btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:#fff;flex-shrink:0"><path d="M6 6h4v12H6zm8 0h4v12h-4z"/></svg> Trailer schließen`;
        btn.style.background = '#555';
      } else {
        btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:#fff;flex-shrink:0"><path d="M8 5v14l11-7z"/></svg> Kein Trailer gefunden`;
        setTimeout(() => {
          btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:#fff;flex-shrink:0"><path d="M8 5v14l11-7z"/></svg> Trailer`;
          btn.style.background = '';
        }, 3000);
      }
    } catch (e) {
      btn.textContent = 'Fehler';
      setTimeout(() => { btn.textContent = 'Trailer'; }, 3000);
    } finally {
      btn.classList.remove('loading');
    }
  }

  async function loadRatings(title, year) {
    const row = document.getElementById('ratingsRow');
    if (!row) return;

    try {
      const params = new URLSearchParams({ title });
      if (year) params.set('year', year);
      const res = await fetch(`/api/ratings?${params}`);
      const data = await res.json();

      let html = '';

      // IMDb Badge
      if (data.imdb && data.imdb.rating) {
        html += `<a class="rating-badge imdb" href="${data.imdb.url || '#'}" target="_blank" onclick="event.stopPropagation()" title="IMDb Bewertung">
          <svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:#000;flex-shrink:0"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87L18.18 21 12 17.77 5.82 21 7 14.14 2 9.27l6.91-1.01z"/></svg>
          ${data.imdb.rating}<span style="font-weight:400;font-size:0.75rem">/10</span>
        </a>`;
      }

      // Rotten Tomatoes Badge
      if (data.rt && data.rt.score !== null) {
        const fresh = data.rt.score >= 60;
        const cls = fresh ? 'rt-fresh' : 'rt-rotten';
        const icon = fresh ? '🍅' : '🤢';
        const link = data.rt.url ? ` href="${data.rt.url}" target="_blank"` : '';
        html += `<a class="rating-badge ${cls}"${link} onclick="event.stopPropagation()" title="Rotten Tomatoes Tomatometer">
          ${icon} ${data.rt.score}%
        </a>`;
      }

      // Nichts gefunden → Row komplett ausblenden
      row.innerHTML = html;
      if (!html) row.style.display = 'none';
    } catch {
      row.innerHTML = `<span class="rating-badge rt-none">Bewertungen nicht verfügbar</span>`;
    }
  }

  function closeTrailer() {
    const embed = document.getElementById('trailerEmbed');
    const iframe = document.getElementById('trailerIframe');
    const btn = document.getElementById('trailerBtn');
    if (embed) embed.classList.remove('visible');
    if (iframe) iframe.src = '';
    if (btn) {
      btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:#fff;flex-shrink:0"><path d="M8 5v14l11-7z"/></svg> Trailer`;
      btn.style.background = '';
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModalBtn();
  });

  function showError(msg) {
    document.getElementById('main').innerHTML = `
      <div class="error-state">
        <p><strong>Fehler beim Laden</strong></p>
        <p style="margin-top:8px;font-size:0.85rem;">${escHtml(msg)}</p>
        <p style="margin-top:12px;font-size:0.85rem;">
          <a href="https://www.uci-kinowelt.de/kinoprogramm/bad-oeynhausen/73/poster" target="_blank" style="color:var(--gold)">
            Direkt auf UCI-Kinowelt öffnen →
          </a>
        </p>
      </div>`;
  }

  function escHtml(str) {
    return String(str || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  // ── Abstimmung ───────────────────────────────────────────
  let isPollMode = false;
  let pollSelected = new Set(); // filmIds

  function togglePollMode() {
    isPollMode = !isPollMode;
    pollSelected.clear();
    document.body.classList.toggle('poll-mode', isPollMode);
    document.getElementById('pollBtn').classList.toggle('active', isPollMode);
    document.querySelectorAll('.movie-card').forEach(c => c.classList.remove('poll-selected'));
    updatePollBar();
  }

  function updatePollBar() {
    const bar  = document.getElementById('pollBar');
    const cnt  = document.getElementById('pollCount');
    const btn  = document.getElementById('pollCreateBtn');
    cnt.textContent = pollSelected.size;
    btn.disabled = pollSelected.size < 2;
    bar.classList.toggle('visible', isPollMode);
  }

  // Card-Klick im Poll-Modus abfangen
  function handleCardClick(e, filmId, idx) {
    if (!isPollMode) { openModal(idx); return; }
    e.stopPropagation();
    const card = e.currentTarget;
    if (pollSelected.has(filmId)) {
      pollSelected.delete(filmId);
      card.classList.remove('poll-selected');
    } else {
      if (pollSelected.size >= 5) {
        card.classList.add('poll-shake');
        setTimeout(() => card.classList.remove('poll-shake'), 400);
        return;
      }
      pollSelected.add(filmId);
      card.classList.add('poll-selected');
    }
    updatePollBar();
  }

  async function createPoll() {
    if (pollSelected.size < 2) return;
    const btn = document.getElementById('pollCreateBtn');
    btn.textContent = 'Erstelle…';
    btn.disabled = true;

    const films = allMovies
      .filter(m => pollSelected.has(m.filmId))
      .map(m => ({ filmId: m.filmId, title: m.title, poster: m.poster, genre: m.genre, runtime: m.runtime }));

    try {
      const res = await fetch('/api/polls', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ films }),
      });
      const data = await res.json();
      if (!data.id) throw new Error('Keine ID erhalten');

      const url = `${location.origin}/?vote=${data.id}`;
      showPollShareModal(url, data.id);
      togglePollMode();
    } catch (err) {
      alert('Fehler: ' + err.message);
    } finally {
      btn.textContent = 'Link erstellen';
    }
  }

  function showPollShareModal(url, id) {
    document.getElementById('modalContent').innerHTML = `
      <div style="padding:28px 24px;">
        <div style="font-size:2rem;margin-bottom:12px;">🗳️</div>
        <h2 style="font-size:1.3rem;font-weight:800;margin-bottom:6px;">Abstimmung erstellt!</h2>
        <p style="color:var(--text-dim);font-size:0.88rem;margin-bottom:4px;">
          Teile diesen Link mit deinen Freunden. Code: <strong style="color:var(--gold)">${id}</strong>
        </p>
        <div class="share-box">
          <span class="share-url" id="shareUrl">${escHtml(url)}</span>
          <button class="copy-btn" onclick="copyPollLink('${escHtml(url)}', this)">Kopieren</button>
        </div>
        <a class="whatsapp-btn" href="https://wa.me/?text=${encodeURIComponent('🎬 Welchen Film sollen wir zusammen schauen? Stimm ab: ' + url)}" target="_blank">
          📲 Per WhatsApp teilen
        </a>
        <p style="text-align:center;margin-top:16px;font-size:0.8rem;color:var(--text-dim);">
          Die Abstimmung läuft 48 Stunden.
        </p>
      </div>
    `;
    document.getElementById('modalBackdrop').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function copyPollLink(url, btn) {
    navigator.clipboard.writeText(url).then(() => {
      btn.textContent = '✓ Kopiert!';
      setTimeout(() => btn.textContent = 'Kopieren', 2000);
    });
  }

  // ── Abstimmungs-Ansicht (?vote=ID) ──────────────────────
  async function checkVoteMode() {
    const params = new URLSearchParams(location.search);
    const id = params.get('vote');
    if (!id) return;

    // Header vereinfachen, Filter ausblenden
    document.querySelector('.filters-bar')?.style.setProperty('display', 'none');
    document.getElementById('pollBtn').style.display = 'none';

    const main = document.getElementById('main');
    main.innerHTML = `<div class="loading-state"><div class="spinner"></div><p>Lade Abstimmung…</p></div>`;

    try {
      const res = await fetch(`/api/polls/${id}`);
      if (!res.ok) throw new Error('Abstimmung nicht gefunden oder abgelaufen.');
      const poll = await res.json();
      renderVoteView(poll, id);
    } catch (err) {
      main.innerHTML = `<div class="error-state"><p><strong>⚠️ ${escHtml(err.message)}</strong></p></div>`;
    }
  }

  function renderVoteView(poll, id) {
    const main = document.getElementById('main');
    const totalVotes = Object.values(poll.votes).reduce((s, v) => s + v, 0);

    // Hat der User schon abgestimmt? (sessionStorage)
    const votedFor = sessionStorage.getItem(`poll-${id}`);

    const cards = poll.films.map(f => {
      const votes = poll.votes[f.filmId] || 0;
      const pct = totalVotes > 0 ? Math.round(votes / totalVotes * 100) : 0;
      const isVoted = votedFor === f.filmId;
      return `
        <div class="vote-card${isVoted ? ' voted-for' : ''}" id="vc-${f.filmId}">
          ${f.poster ? `<img src="${escHtml(f.poster)}" alt="${escHtml(f.title)}" onerror="this.style.display='none'">` : ''}
          <div class="vote-card-body">
            <div class="vote-card-title">${escHtml(f.title)}</div>
            <div class="vote-card-meta">${[f.genre?.split(',')[0], f.runtime ? f.runtime + ' Min.' : ''].filter(Boolean).join(' · ')}</div>
            ${votedFor ? `
              <div class="result-bar-wrap">
                <div class="result-bar-label"><span>${votes} Stimme${votes !== 1 ? 'n' : ''}</span><span>${pct}%</span></div>
                <div class="result-bar-track"><div class="result-bar-fill" style="width:${pct}%"></div></div>
              </div>
            ` : ''}
            <button class="vote-card-btn" ${votedFor ? 'disabled' : `onclick="castVote('${id}','${f.filmId}')"`}>
              ${isVoted ? '✓ Meine Wahl' : votedFor ? '–' : 'Abstimmen'}
            </button>
          </div>
        </div>
      `;
    }).join('');

    main.innerHTML = `
      <div class="vote-header">
        <h1>🗳️ Film-Abstimmung</h1>
        <p>${votedFor ? `${totalVotes} Stimme${totalVotes !== 1 ? 'n' : ''} bisher` : 'Für welchen Film seid ihr heute Abend?'}</p>
      </div>
      <div class="vote-grid">${cards}</div>
    `;
  }

  async function castVote(pollId, filmId) {
    try {
      const res = await fetch(`/api/polls/${pollId}/vote`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ filmId }),
      });
      const data = await res.json();
      if (data.alreadyVoted || data.success) {
        sessionStorage.setItem(`poll-${pollId}`, filmId);
        // Frisch laden für aktualisierte Zahlen
        const res2 = await fetch(`/api/polls/${pollId}`);
        const poll = await res2.json();
        renderVoteView(poll, pollId);
      }
    } catch (err) {
      alert('Abstimmung fehlgeschlagen: ' + err.message);
    }
  }

  // Initial load
  document.getElementById('loadingState'); // already shown

  // ── Gemeinsame Watchlist (eine für alle) ─────────────────
  let groupSyncInterval = null;

  function getMyName() {
    return localStorage.getItem('uci-my-name') || '';
  }
  function saveMyName(n) {
    localStorage.setItem('uci-my-name', n.trim() || 'Jemand');
  }

  async function renderGroupWatchlist() {
    const main = document.getElementById('main');
    main.innerHTML = `<div class="loading-state"><div class="spinner"></div><p>Lade…</p></div>`;

    // Auto-sync starten falls noch nicht aktiv
    if (!groupSyncInterval) {
      groupSyncInterval = setInterval(async () => {
        if (activeFilter !== 'group') { clearInterval(groupSyncInterval); groupSyncInterval = null; return; }
        try {
          const r = await fetch('/api/group-watchlist');
          const list = await r.json();
          renderGroupView(list);
        } catch {}
      }, 5000);
    }

    try {
      const res = await fetch('/api/group-watchlist');
      const list = await res.json();
      renderGroupView(list);
    } catch (err) {
      main.innerHTML = `<div class="error-state"><p><strong>⚠️ ${escHtml(err.message)}</strong></p></div>`;
    }
  }

  function renderGroupView(list) {
    const main = document.getElementById('main');
    const myName = getMyName();
    const addedIds = new Set(list.films.map(f => f.filmId));

    // Sortierung: aktuell laufende zuerst, dann demnächst (nach Startdatum)
    const sortedFilms = [...list.films].sort((a, b) => {
      const ma = allMovies.find(m => m.filmId === a.filmId);
      const mb = allMovies.find(m => m.filmId === b.filmId);
      const aUpcoming = ma?.isUpcoming ?? false;
      const bUpcoming = mb?.isUpcoming ?? false;
      if (aUpcoming !== bUpcoming) return aUpcoming ? 1 : -1; // laufende zuerst
      // Beide gleich → nach erstem Vorstellungsdatum
      const aDate = ma?.firstDate ? new Date(ma.firstDate) : new Date(9999,0);
      const bDate = mb?.firstDate ? new Date(mb.firstDate) : new Date(9999,0);
      return aDate - bDate;
    });

    const filmItems = list.films.length > 0
      ? sortedFilms.map(f => {
          const movieData = allMovies.find(m => m.filmId === f.filmId);
          const showtimes = movieData?.showtimes || [];

          const showtimesHtml = showtimes.length > 0
            ? `<div class="slist-showtimes">
                ${showtimes.slice(0, 3).map(day => `
                  <div class="slist-showday">
                    <span class="slist-showday-label">${escHtml(day.date)}</span>
                    <span class="slist-showday-times">
                      ${day.times.slice(0, 4).map(t =>
                        `<span class="slist-showtime">${escHtml(t.time)}${t.version ? ` <em>${escHtml(t.version)}</em>` : ''}</span>`
                      ).join('')}
                      ${day.times.length > 4 ? `<span class="slist-showtime-more">+${day.times.length - 4}</span>` : ''}
                    </span>
                  </div>
                `).join('')}
                ${showtimes.length > 3 ? `<div style="font-size:0.72rem;color:var(--text-dim);margin-top:4px;">+ ${showtimes.length - 3} weitere Tage</div>` : ''}
              </div>`
            : `<div class="slist-no-showtimes">Noch keine Vorstellungen geplant</div>`;

          return `
            <div class="slist-film-item">
              ${f.poster ? `<img class="slist-film-poster" src="${escHtml(f.poster)}" onerror="this.style.display='none'">` : '<div class="slist-film-poster"></div>'}
              <div class="slist-film-info">
                <div class="slist-film-title">${escHtml(f.title)}</div>
                <div class="slist-film-meta">
                  ${movieData?.isUpcoming
                    ? `<span class="slist-status upcoming">Demnächst</span>`
                    : `<span class="slist-status current">Läuft</span>`}
                  ${[f.genre?.split(',')[0], f.runtime ? f.runtime + ' Min.' : ''].filter(Boolean).join(' · ')}
                </div>
                ${showtimesHtml}
                <div class="slist-film-by">von ${escHtml(f.addedBy)}</div>
              </div>
              <button class="slist-remove-btn" onclick="groupRemove('${f.filmId}')" title="Entfernen">×</button>
            </div>
          `;
        }).join('')
      : `<div class="slist-empty">Noch leer — füge Filme aus dem Programm hinzu!</div>`;

    const sortedProgram = [...allMovies].sort((a, b) => {
      if (a.isUpcoming !== b.isUpcoming) return a.isUpcoming ? 1 : -1;
      const aDate = a.firstDate ? new Date(a.firstDate) : new Date(9999,0);
      const bDate = b.firstDate ? new Date(b.firstDate) : new Date(9999,0);
      return aDate - bDate;
    });

    const programItems = sortedProgram.map(m => `
      <div class="slist-program-item${addedIds.has(m.filmId) ? ' already-added' : ''}">
        ${m.poster ? `<img class="slist-program-poster" src="${escHtml(m.poster)}" onerror="this.style.display='none'">` : '<div class="slist-program-poster"></div>'}
        <div class="slist-program-title">${escHtml(m.title)}</div>
        <button class="slist-add-btn" onclick="groupAdd('${m.filmId}')" ${addedIds.has(m.filmId) ? 'disabled' : ''}>
          ${addedIds.has(m.filmId) ? '✓' : '+ Hinzufügen'}
        </button>
      </div>
    `).join('');

    main.innerHTML = `
      <div class="slist-view">
        <div class="slist-header">
          <h1>👥 Gemeinsame Watchlist</h1>
          <p>Alle sehen und bearbeiten dieselbe Liste · Sync alle 5 Sek.</p>
        </div>

        <div class="slist-name-box">
          <label>Dein Name:</label>
          <input id="myNameInput" type="text" placeholder="z.B. Max" maxlength="20" value="${escHtml(myName)}"
            oninput="saveMyName(this.value)" onkeydown="if(event.key==='Enter')this.blur()">
        </div>

        <div class="slist-films">${filmItems}</div>

        <div class="slist-add-section">
          <h3>Aus dem Programm hinzufügen</h3>
          <div class="slist-program-grid">${programItems}</div>
        </div>

        <div class="slist-sync-info">🔄 Automatischer Sync aktiv</div>
      </div>
    `;
  }

  async function groupAdd(filmId) {
    const m = allMovies.find(x => x.filmId === filmId);
    if (!m) return;
    try {
      await fetch('/api/group-watchlist/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          film: { filmId: m.filmId, title: m.title, poster: m.poster, genre: m.genre, runtime: m.runtime },
          addedBy: getMyName() || 'Jemand',
        }),
      });
      const r = await fetch('/api/group-watchlist');
      renderGroupView(await r.json());
    } catch {}
  }

  async function groupRemove(filmId) {
    try {
      await fetch('/api/group-watchlist/remove', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ filmId }),
      });
      const r = await fetch('/api/group-watchlist');
      renderGroupView(await r.json());
    } catch {}
  }

  // Prüfen ob wir im Vote-Modus sind
  const voteParam = new URLSearchParams(location.search).get('vote');
  if (voteParam) {
    checkVoteMode();
  } else {
    loadMovies();
  }
</script>
</body>
</html>
